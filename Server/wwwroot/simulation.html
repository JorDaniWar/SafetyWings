<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/simulation.css"> 
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
    <title> Safety Wings - Simulation</title>
</head>
<body>
    <header class="header">
        <button class="sidebar-button" onclick="">☰</button>
        <a class="logo" href="simulation.html">✈️ Safety Wings</a>
    </header>
    <div class="dashboard-container">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="sidebar">  
            <nav class="sidebar-nav">
                <div class="sidebar-header">
                    <h2>Меню</h2>
                </div>
                <ul>
                    <li><a href="dashboard.html#home">Начало</a></li>
                    <li><a href="dashboard.html#last-flights">Последни полети</a></li>
                    <li><a href="dashboard.html#add-log">Добавяне на запис</a></li>
                    <li><a href="dashboard.html#all-flights">Всички полети</a></li>
                    <li><a href="dashboard.html#statistics">Статистика</a></li>
                    <li><a href="simulation.html">Симулация на данни</a></li>
                </ul>
                <button type="button" class="logout-btn" onclick="logout()" 
                    id="logout-btn">Изход</button>
            </nav>
        </aside>
        <main>
            <section class= "simulation-container" id="simulation-container">
                <header class="simulation-header">
                    <h1>Симулация на данни</h1>
                </header>
                <div class="simulation-content" id="simulation-content">
                    <button class="simulation-content-button" id="simulastion-content-button" onclick="simulateLogs()">Симулация </button>
                </div>
            </section>
            <section class="added-logs-container" id="added-logs-container">
                <header class="added-logs-header">
                    <h1>Добавени записи</h1>
                </header>
            </section>
            <div class="added-logs-content">
                <table class="added-logs-table">
                    <thead>
                        <tr>
                            <th>Номер</th>
                            <th>Пулс</th>
                            <th>Кислородна Сатурация</th>
                            <th>Температура</th>
                            <th>Кортизол</th>
                            <th>Дата и час</th>
                        </tr>
                    </thead>
                    <tbody id="added-logs-all">
                        <tr>
                            <td colspan="10" style="text-align: center; color: white; font-size: 20px; font-weight:bold;">В момента няма добавени записи!</td>
                        </tr>
                    </tbody>
                </table>
                <button class="showAllLogs" id="showAllLogs">Виж всички записи</button>
            </div>
        </main>
        <script src="js/simulation.js"></script>
</body>
