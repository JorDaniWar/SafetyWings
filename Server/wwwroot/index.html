<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Wings - Вход</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✈️</text></svg>">
    <link rel="stylesheet" href="css/style.css?v=1.1">
</head>
<body class="aviation-theme">
    <div class="login-container">
        <header>
            <h1>✈️ SAFETY WINGS</h1>
            <p>Система за авиационен мониторинг</p>
        </header>
        
        <main class="login-card">
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">Потребителско име</label>
                    <input type="text" id="username" placeholder="Вашето потребителско име">
                </div>
                
                <div class="input-group">
                    <label for="password">Парола</label>
                    <input type="password" id="password"  placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-login" id="btn-login"> 🛫 Влизане!</button>
            </form>
            <div id="message"></div>
        </main>

        <footer class="login__footer">
            <p>Нямате профил? <a href="register.html">Регистрирайте се тук</a></p>
            <p>&copy; 2026 Safety Wings Project. Всички права запазени. </p>
        </footer>

        
    </div>
    <script src="js/script.js?v=1.1"></script>
</body>
</html>
